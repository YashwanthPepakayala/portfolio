<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MR. Y | SYSTEM</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: radial-gradient(circle at top, #020617, #000);
    color: white;
    overflow-x: hidden;
}

/* TERMINAL INTRO */
#terminal {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: black;
    color: #00ff9f;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    z-index: 9999;
}

/* MAIN UI */
#main {
    display: none;
}

header {
    text-align: center;
    padding: 40px 20px;
}

h1 {
    font-size: 3rem;
    color: #ff003c;
    text-shadow: 0 0 15px red, 0 0 40px crimson;
}

.subtitle {
    color: #00d4ff;
    font-size: 1rem;
    letter-spacing: 3px;
}

nav {
    display: flex;
    justify-content: center;
    gap: 20px;
}

nav a {
    text-decoration: none;
    color: #00d4ff;
    border: 1px solid #00d4ff;
    padding: 8px 16px;
    border-radius: 6px;
    transition: 0.3s;
}

nav a:hover {
    background: #ff003c;
    box-shadow: 0 0 15px red;
}

.section {
    max-width: 1000px;
    margin: auto;
    padding: 60px 20px;
}

/* SKILL GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
}

.card {
    background: rgba(0,0,0,0.7);
    border: 1px solid #ff003c;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px) scale(1.03);
    box-shadow: 0 0 25px red;
}

.skill-title {
    font-size: 1.2rem;
    color: #00d4ff;
}

/* PROGRESS BAR */
.bar {
    height: 6px;
    background: #111;
    margin-top: 10px;
    border-radius: 5px;
    overflow: hidden;
}

.fill {
    height: 100%;
    background: linear-gradient(90deg, red, cyan);
}

footer {
    text-align: center;
    padding: 20px;
    opacity: 0.7;
}

/* DRIPPING EFFECT */
.drip {
    position: fixed;
    top: -50px;
    width: 4px;
    height: 40px;
    background: red;
    animation: drip 3s infinite;
}

@keyframes drip {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(100vh); opacity: 0; }
}
</style>
</head>
<body>

<div id="terminal">Initializing system...</div>

<div id="main">

<header>
    <h1>MR. Y</h1>
    <div class="subtitle">SYSTEM ARCHITECT • SERVICENOW ENGINEER • AI INTEGRATOR</div>
</header>

<nav>
    <a href="#skills">Skills</a>
</nav>

<section id="skills" class="section">
    <h2>Core Expertise</h2>

    <div class="grid">

        <div class="card">
            <div class="skill-title">ServiceNow</div>
            <div class="bar"><div class="fill" style="width:95%"></div></div>
        </div>

        <div class="card">
            <div class="skill-title">Automation & Integrations</div>
            <div class="bar"><div class="fill" style="width:92%"></div></div>
        </div>

        <div class="card">
            <div class="skill-title">API Engineering</div>
            <div class="bar"><div class="fill" style="width:90%"></div></div>
        </div>

        <div class="card">
            <div class="skill-title">Machine Learning</div>
            <div class="bar"><div class="fill" style="width:88%"></div></div>
        </div>

        <div class="card">
            <div class="skill-title">Python</div>
            <div class="bar"><div class="fill" style="width:93%"></div></div>
        </div>

        <div class="card">
            <div class="skill-title">System Design</div>
            <div class="bar"><div class="fill" style="width:91%"></div></div>
        </div>

        <div class="card">
            <div class="skill-title">Data Analysis</div>
            <div class="bar"><div class="fill" style="width:89%"></div></div>
        </div>

        <div class="card">
            <div class="skill-title">Frontend Engineering</div>
            <div class="bar"><div class="fill" style="width:85%"></div></div>
        </div>

    </div>
</section>

<footer>
    <p>© 2026 MR. Y | Engineered Precision</p>
</footer>

</div>

<script>

// TERMINAL ANIMATION
const terminal = document.getElementById("terminal");
const messages = [
    "Initializing system...",
    "Loading modules...",
    "Authenticating identity...",
    "Access Granted: MR. Y",
    "Launching interface..."
];

let i = 0;
function typeMessage() {
    if (i < messages.length) {
        terminal.innerText = messages[i];
        i++;
        setTimeout(typeMessage, 900);
    } else {
        terminal.style.display = "none";
        document.getElementById("main").style.display = "block";
    }
}

typeMessage();

// DRIPS
for(let i=0;i<25;i++){
    let drip = document.createElement('div');
    drip.className = 'drip';
    drip.style.left = Math.random()*100 + 'vw';
    drip.style.animationDuration = (2 + Math.random()*3) + 's';
    document.body.appendChild(drip);
}

</script>

</body>
</html>
